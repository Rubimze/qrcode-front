<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gerador de QR Code</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        input { padding: 10px; width: 300px; }
        button { padding: 10px 20px; cursor: pointer; }
        #result { margin-top: 20px; }
        img { max-width: 200px; border: 1px solid #ccc; padding: 10px; }
    </style>
</head>
<body>

    <h1>Crie seu QR Code 🚀</h1>
    <input type="text" id="urlInput" placeholder="Cole seu link aqui...">
    <button onclick="gerarQrCode()">Gerar</button>

    <div id="result">
        </div>

    <script>
        async function gerarQrCode() {
            const url = document.getElementById('urlInput').value;
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = "Gerando...";

            try {
                // Aqui você vai trocar pelo link da sua API na nuvem depois do deploy
                const response = await fetch('https://qr-code-generator-vnv4.onrender.com/qrcode', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: url })
                });

                if (response.ok) {
                    const data = await response.json();
                    // Trocamos data.qrCodeUrl por data.url 👇
                    resultDiv.innerHTML = `<img src="${data.url}" alt="QR Code">
                                           <br><a href="${data.url}" target="_blank">Abrir imagem</a>`;
                } else {
                    resultDiv.innerHTML = "Erro ao gerar o QR Code.";
                }
            } catch (error) {
                resultDiv.innerHTML = "Erro de conexão com a API.";
            }
        }
    </script>
</body>
</html>
