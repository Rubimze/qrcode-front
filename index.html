<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de QR Code</title>
    <style>
        /* Reseta margens e aplica box-sizing para responsividade */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f4f7f6; /* Fundo cinza bem claro */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* O "Cartão" centralizado */
        .container {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); /* Sombra suave */
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        h1 { 
            color: #2c3e50; 
            font-size: 24px;
            margin-bottom: 25px;
        }

        input { 
            width: 100%; 
            padding: 14px 15px; 
            margin-bottom: 20px;
            border: 1px solid #dcdde1;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            color: #333;
        }

        /* Efeito ao clicar no input */
        input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }

        button { 
            width: 100%;
            padding: 14px 20px; 
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s;
        }

        /* Efeito ao passar o mouse e clicar no botão */
        button:hover { background-color: #2980b9; }
        button:active { transform: scale(0.98); }

        #result { 
            margin-top: 30px; 
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .loading {
            color: #7f8c8d;
            font-style: italic;
        }

        img { 
            max-width: 100%; 
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            padding: 10px;
            border: 1px solid #ecf0f1;
            /* Animação de entrada 👇 */
            animation: fadeIn 0.6s ease-out forwards;
        }

        a {
            margin-top: 20px;
            color: #3498db;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        a:hover { color: #2980b9; text-decoration: underline; }

        /* Criação da animação Fade-In */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Crie seu QR Code 🚀</h1>
        <input type="text" id="urlInput" placeholder="Cole seu link ou texto aqui...">
        <button onclick="gerarQrCode()">Gerar Imagem</button>

        <div id="result">
            </div>
    </div>

    <script>
        async function gerarQrCode() {
            const url = document.getElementById('urlInput').value;
            const resultDiv = document.getElementById('result');
            
            if(!url) {
                resultDiv.innerHTML = "<p style='color: #e74c3c;'>Por favor, insira um link!</p>";
                return;
            }

            resultDiv.innerHTML = "<p class='loading'>Gerando e enviando para nuvem...</p>";

            try {
                const response = await fetch('https://qr-code-generator-vnv4.onrender.com/qrcode', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: url })
                });

                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML = `<img src="${data.url}" alt="QR Code Gerado">
                                           <br><a href="${data.url}" target="_blank">Abrir imagem original</a>`;
                } else {
                    resultDiv.innerHTML = "<p style='color: #e74c3c;'>Erro ao gerar o QR Code.</p>";
                }
            } catch (error) {
                resultDiv.innerHTML = "<p style='color: #e74c3c;'>Erro de conexão com o servidor da API.</p>";
            }
        }
    </script>
</body>
</html>
